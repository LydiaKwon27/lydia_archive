name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  SUPABASE_URL: https://saubsoroohbdnihlfhkp.supabase.co
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhdWJzb3Jvb2hiZG5paGxmaGtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTI2NzAsImV4cCI6MjA5MDg4ODY3MH0.DWtBT4Fes3U12t4Xw4kv-QR3FxSEGTx53CEFi19WlKw

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase posts table
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/posts?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          if [ "$response" = "200" ]; then
            echo "Supabase active. HTTP $response"
          else
            echo "Ping failed. HTTP $response"
            exit 1
          fi
